<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tasteza — Offline</title>
  <style>
    body { margin:0; font-family: sans-serif; background:#f6f5f1;
           display:flex; align-items:center; justify-content:center;
           min-height:100vh; text-align:center; }
    .box { padding:40px; }
    .icon { font-size:64px; margin-bottom:16px; }
    h1 { color:#1a1a2e; margin:0 0 8px; }
    p  { color:#5a5a78; }
    button { margin-top:20px; padding:12px 28px; background:#e8572a;
             color:#fff; border:none; border-radius:10px;
             font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🍽️</div>
    <h1>Tasteza</h1>
    <p>Loading app… please wait or refresh.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
